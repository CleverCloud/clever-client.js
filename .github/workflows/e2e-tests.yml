name: E2E tests
on:
  pull_request:
    types: [labeled, unlabeled, opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
    branches-ignore:
      - 'release-please--**'

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --user 1001
    if: contains(github.event.pull_request.labels.*.name, 'run-e2e-tests')

    steps:
      - name: '[Prepare] Checkout'
        uses: actions/checkout@v5
      - name: '[Prepare] Setup'
        uses: ./.github/actions/ci-setup

      - name: '[E2E tests] Browser tests'
        env:
          # consumer console
          OAUTH_CONSUMER_KEY: ${{ secrets.OAUTH_CONSUMER_KEY }}
          OAUTH_CONSUMER_SECRET: ${{ secrets.OAUTH_CONSUMER_SECRET }}
          # ci account (linked to github)
          TEST_USER_WITH_GITHUB_EMAIL: ${{ secrets.TEST_USER_WITH_GITHUB_EMAIL }}
          TEST_USER_WITH_GITHUB_PASSWORD: ${{ secrets.TEST_USER_WITH_GITHUB_PASSWORD }}
          # ci account (not linked to github)
          TEST_USER_WITHOUT_GITHUB_EMAIL: ${{ secrets.TEST_USER_WITHOUT_GITHUB_EMAIL }}
          TEST_USER_WITHOUT_GITHUB_PASSWORD: ${{ secrets.TEST_USER_WITHOUT_GITHUB_PASSWORD }}
          TEST_USER_WITHOUT_GITHUB_TOTP_SECRET: ${{ secrets.TEST_USER_WITHOUT_GITHUB_TOTP_SECRET }}
        run: pnpm run test:e2e:browser
      - name: '[E2E tests] Node tests'
        env:
          # consumer console
          OAUTH_CONSUMER_KEY: ${{ secrets.OAUTH_CONSUMER_KEY }}
          OAUTH_CONSUMER_SECRET: ${{ secrets.OAUTH_CONSUMER_SECRET }}
          # ci account (linked to github)
          TEST_USER_WITH_GITHUB_EMAIL: ${{ secrets.TEST_USER_WITH_GITHUB_EMAIL }}
          TEST_USER_WITH_GITHUB_PASSWORD: ${{ secrets.TEST_USER_WITH_GITHUB_PASSWORD }}
          # ci account (not linked to github)
          TEST_USER_WITHOUT_GITHUB_EMAIL: ${{ secrets.TEST_USER_WITHOUT_GITHUB_EMAIL }}
          TEST_USER_WITHOUT_GITHUB_PASSWORD: ${{ secrets.TEST_USER_WITHOUT_GITHUB_PASSWORD }}
          TEST_USER_WITHOUT_GITHUB_TOTP_SECRET: ${{ secrets.TEST_USER_WITHOUT_GITHUB_TOTP_SECRET }}
        run: pnpm run test:e2e:node
