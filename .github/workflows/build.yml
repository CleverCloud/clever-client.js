name: Build
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Set via the workflow env (not $GITHUB_ENV, which GitHub forbids for NODE_OPTIONS).
env:
  NODE_OPTIONS: '--max-old-space-size=16384'

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: '[Prepare] Checkout'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: '[Prepare] Setup'
        uses: ./.github/actions/ci-setup

      - name: '[Code quality] Check commit message'
        if: github.event_name == 'pull_request'
        run: node ./node_modules/@commitlint/cli/cli.js --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
      - name: '[Code quality] Check ESLint'
        run: pnpm run lint
      - name: '[Code quality] Check types'
        run: pnpm run typecheck
      - name: '[Code quality] Check format'
        run: pnpm run format:check

  get-playwright-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pw.outputs.version }}
    steps:
      - name: '[Prepare] Checkout'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: '[Prepare] Setup'
        uses: ./.github/actions/ci-setup
      - name: '[Prepare] Derive Playwright version'
        id: pw
        uses: ./.github/actions/get-playwright-version

  tests:
    needs: get-playwright-version
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v${{ needs.get-playwright-version.outputs.version }}-noble
      options: --user 1001

    steps:
      - name: '[Prepare] Checkout'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: '[Prepare] Setup'
        uses: ./.github/actions/ci-setup

      - name: '[Unit tests] Browser tests'
        run: pnpm run test:unit:browser
      - name: '[Unit tests] Node tests'
        run: pnpm run test:unit:node

  build:
    runs-on: ubuntu-latest

    steps:
      - name: '[Prepare] Checkout'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: '[Prepare] Setup'
        uses: ./.github/actions/ci-setup

      - name: '[Build]'
        run: pnpm run build
