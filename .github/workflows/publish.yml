name: Publish
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

permissions:
  id-token: write # Required for OIDC
  contents: read

# Set via the workflow env (not $GITHUB_ENV, which GitHub forbids for NODE_OPTIONS).
env:
  NODE_OPTIONS: '--max-old-space-size=16384'

jobs:
  get-playwright-version:
    name: 'Get Playwright version'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pw.outputs.version }}
    steps:
      - name: '[Prepare] Checkout'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - name: '[Prepare] Setup'
        uses: ./.github/actions/ci-setup
      - name: '[Prepare] Derive Playwright version'
        id: pw
        uses: ./.github/actions/get-playwright-version

  publish:
    name: 'Publish'
    needs: get-playwright-version
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v${{ needs.get-playwright-version.outputs.version }}-noble
      options: --user 1001
    steps:
      - name: '[Prepare] Decode version from tag'
        id: version_regex
        uses: KyoriPowered/action-regex-match@v3
        with:
          text: ${{ github.ref_name }}
          regex: '^(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)(?:-(beta)\.(?:0|[1-9]\d*))?$'
      - name: '[Prepare] Parse version'
        id: version_parse
        if: steps.version_regex.outputs.match != ''
        run: echo "prerelease=${{ steps.version_regex.outputs.group1 }}" >> $GITHUB_OUTPUT
      - name: '[Prepare] Extract NPM tag'
        id: npm_tag
        run: p=${{ steps.version_parse.outputs.prerelease }} && echo "tag=${p:-latest}" >> $GITHUB_OUTPUT
      - name: '[Prepare] Checkout'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - name: '[Prepare] Setup'
        uses: ./.github/actions/ci-setup
      - name: '[Publish] version ${{ github.ref_name }} with tag ${{ steps.npm_tag.outputs.tag }}'
        run: |
          pnpm publish --access public --tag ${{ steps.npm_tag.outputs.tag }} --provenance --no-git-checks
